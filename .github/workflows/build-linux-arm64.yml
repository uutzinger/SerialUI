name: Build Linux Executable

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install app dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyqt6 pyqtgraph markdown bleak numpy scipy numba fastplotlib PyOpenGL pybind11 setuptools cobs tamp pyudev

      - name: Build executable archive via release.sh (with C-accelerated line parser)
        shell: bash
        env:
          PYTHON_BIN: python
        run: |
          bash scripts/release.sh --build-c-executable --build-c-accelerated

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SerialUI-linux-${{ matrix.arch }}-${{ github.ref_name }}-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/SerialUI-*.zip
            dist/SerialUI
